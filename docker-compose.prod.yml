services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sportscout-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - sqlite-data:/app/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    container_name: sportscout-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default

volumes:
  sqlite-data:
